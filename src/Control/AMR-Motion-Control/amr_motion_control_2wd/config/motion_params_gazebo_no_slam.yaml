# Motion control parameters for Gazebo WITHOUT SLAM (pure odometry mode)
# Use this config when running Gazebo + ACS without RTAB-Map/LIO-SAM.
# Pose source: Gazebo ground-truth /odom instead of SLAM odometry.
# Requires static TF: map -> odom (identity) in launch file.
#
# Usage: ros2 launch amr_motion_control_2wd motion_control_gazebo.launch.py \
#          config:=motion_params_gazebo_no_slam.yaml

amr_motion_control_2wd:
  ros__parameters:
    # Pioneer 2DX geometry (from model.sdf DiffDrive plugin)
    wheel_separation: 0.34
    wheel_radius: 0.11

    # TF frame
    robot_base_frame: "base_footprint"

    # Control rate
    control_rate_hz: 50.0

    # Spin precision (relaxed for Gazebo simulation)
    imu_deadband_deg: 0.1
    min_speed_dps: 3.0
    fine_correction_threshold_deg: 0.5
    fine_correction_speed_dps: 5.0
    fine_correction_timeout_sec: 5.0
    settling_delay_ms: 300

    # Translate parameters (tuned for Gazebo stability)
    translate_Kp_heading: 0.3
    translate_Kd_heading: 0.05
    translate_K_stanley: 0.5
    translate_K_soft: 1.0
    translate_max_omega: 1.0
    translate_alpha_max: 0.5
    translate_heading_threshold_deg: 45.0
    translate_max_lateral_offset: 1.0
    translate_heading_filter_window: 5
    translate_goal_reach_threshold: 0.05
    translate_arrival_tolerance: 0.05
    translate_min_vx: 0.02
    translate_behind_start_speed: 0.2
    translate_max_timeout_sec: 60.0
    translate_localization_timeout_sec: 2.0
    translate_position_jump_threshold: 0.5
    translate_enable_localization_watchdog: true
    translate_walk_accel_limit: 0.5
    translate_walk_decel_limit: 1.0

    # Stanley softening: prevents huge corrections at low speed (atan2(K*e_lat, v+soft))
    # Default 0.3 causes 27° correction at v=0.02m/s with e_lat=0.083 → oscillation
    stanley_softening: 2.0
    # Lateral abort limit: 0.8m default is too strict for Gazebo (position errors ~0.1m)
    lateral_recover_dist_m: 2.0

    # FIX: Use correct parameter name matching C++ code (max_omega_rad_s, not translate_max_omega)
    # Reduced to 0.4 to prevent heading oscillation in Gazebo
    max_omega_rad_s: 0.4

    # NO-SLAM: Pose topic = Gazebo ground-truth odometry
    translate_pose_topic: "/odom"
    translate_pose_qos: 2

    # Translate reverse
    translate_reverse_arrival_tolerance: 0.05
    translate_reverse_pose_topic: "/odom"
    translate_reverse_max_omega_rad_s: 0.8

    # YawControl parameters
    yaw_control_Kp_heading: 1.0
    yaw_control_Kd_heading: 0.3
    yaw_control_max_omega: 1.0
    yaw_control_heading_threshold_deg: 180.0
    yaw_control_max_lateral_offset: 5.0
    yaw_control_alpha_max: 0.5
    yaw_control_min_turning_radius: 0.5
    yaw_control_heading_filter_window: 5
    yaw_control_goal_reach_threshold: 0.05
    yaw_control_min_vx: 0.02
    yaw_control_max_timeout_sec: 60.0
    yaw_control_localization_timeout_sec: 2.0
    yaw_control_position_jump_threshold: 0.5
    yaw_control_enable_localization_watchdog: true
    yaw_control_walk_accel_limit: 0.5
    yaw_control_walk_decel_limit: 1.0
    yaw_control_pose_topic: "/odom"
    yaw_control_pose_qos: 2
    transient_omega_rate_limit: 0.5
